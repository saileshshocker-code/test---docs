<div class="try-it-out">
    <div class="try-it-header">
        <h2>Try it out</h2>
        <span style="color: #8898aa; cursor: pointer;">ⓘ</span>
    </div>
    <div class="try-it-content">
        <div class="try-it-tabs">
            <button class="try-tab active" data-tab="0">Start a payment</button>
            <button class="try-tab" data-tab="1">Sell a product</button>
            <button class="try-tab" data-tab="2">Issue coupons</button>
            <button class="try-tab" data-tab="3">Get your balance</button>
            <button class="try-tab" data-tab="4">Manage taxes</button>
        </div>
        <div class="code-container">
            <div class="code-block-wrapper" id="codeBlock">
                <div class="code-scrollable">
                    <pre class="code-block" id="codeContent"></pre>
                </div>
                <div class="sign-in-bar">
                    <span><a href="#">Sign in</a> to edit real requests.</span>
                    <span class="info-icon">?</span>
                    <div class="resize-handle" id="resizeHandle">
                        <div class="resize-icon"></div>
                    </div>
                </div>
            </div>
            <div class="learn-more">
                <a href="#">Learn more about products and prices →</a>
            </div>
        </div>
    </div>
</div>
